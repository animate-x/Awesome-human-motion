<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Human Motion Research Map</title>
  <desc id="desc">A research map linking motion capture, datasets, motion generation, motion interaction, humanoid simulation, games and animation, and embodied AI.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#52616b"/>
    </marker>
    <style>
      .title{font:700 30px Arial,Helvetica,sans-serif;fill:#14212b}
      .subtitle{font:400 16px Arial,Helvetica,sans-serif;fill:#52616b}
      .box{fill:#ffffff;stroke:#c7d0d8;stroke-width:1.5;rx:18}
      .box-blue{fill:#f2f8ff;stroke:#91b5dc}
      .box-green{fill:#f4fbf5;stroke:#94c9a3}
      .box-violet{fill:#f8f5ff;stroke:#b7a7df}
      .box-amber{fill:#fff8ec;stroke:#ddb56d}
      .box-gray{fill:#f7f8fa;stroke:#bbc4cc}
      .label{font:700 20px Arial,Helvetica,sans-serif;fill:#14212b}
      .note{font:400 13px Arial,Helvetica,sans-serif;fill:#52616b}
      .chip{fill:#ffffff;stroke:#d8e0e6;stroke-width:1;rx:12}
      .chipText{font:700 13px Arial,Helvetica,sans-serif;fill:#27343d}
      .flow{fill:none;stroke:#52616b;stroke-width:2.2;marker-end:url(#arrow)}
      .flow-soft{fill:none;stroke:#83919b;stroke-width:1.8;stroke-dasharray:6 6;marker-end:url(#arrow)}
      .flow-app{fill:none;stroke:#1f7a5a;stroke-width:2;marker-end:url(#arrow)}
      .caption{font:700 12px Arial,Helvetica,sans-serif;fill:#1f7a5a;text-transform:uppercase}
      .small{font:400 12px Arial,Helvetica,sans-serif;fill:#65737d}
    </style>
  </defs>

  <rect width="1280" height="760" fill="#ffffff"/>
  <text class="title" x="48" y="58">Human Motion Research Map</text>
  <text class="subtitle" x="48" y="86">Capture creates motion evidence; datasets improve capture and power generation, interaction, and embodied simulation.</text>

  <rect class="box box-blue" x="70" y="155" width="260" height="160" rx="18"/>
  <text class="label" x="96" y="195">Motion Capture</text>
  <text class="note" x="96" y="220">Markerless, optical, and video-to-motion systems</text>
  <rect class="chip" x="96" y="244" width="66" height="32" rx="12"/><text class="chipText" x="113" y="265">Vicon</text>
  <rect class="chip" x="172" y="244" width="86" height="32" rx="12"/><text class="chipText" x="189" y="265">AIMoCap</text>
  <rect class="chip" x="96" y="282" width="72" height="32" rx="12"/><text class="chipText" x="116" y="303">WHAM</text>

  <rect class="box box-green" x="510" y="155" width="260" height="160" rx="18"/>
  <text class="label" x="536" y="195">Datasets</text>
  <text class="note" x="536" y="220">Motion corpora, labels, and evaluation data</text>
  <rect class="chip" x="536" y="244" width="76" height="32" rx="12"/><text class="chipText" x="554" y="265">AMASS</text>
  <rect class="chip" x="622" y="244" width="104" height="32" rx="12"/><text class="chipText" x="639" y="265">HumanML3D</text>
  <rect class="chip" x="536" y="282" width="70" height="32" rx="12"/><text class="chipText" x="553" y="303">BABEL</text>

  <rect class="box box-violet" x="70" y="410" width="260" height="165" rx="18"/>
  <text class="label" x="96" y="450">Motion Generation</text>
  <text class="note" x="96" y="475">Text, action, and control to 3D motion</text>
  <rect class="chip" x="96" y="499" width="84" height="32" rx="12"/><text class="chipText" x="114" y="520">Kimodo</text>
  <rect class="chip" x="190" y="499" width="118" height="32" rx="12"/><text class="chipText" x="205" y="520">HY-Motion</text>
  <rect class="chip" x="96" y="537" width="96" height="32" rx="12"/><text class="chipText" x="113" y="558">MotionGPT</text>

  <rect class="box box-violet" x="510" y="410" width="260" height="165" rx="18"/>
  <text class="label" x="536" y="450">Motion Interaction</text>
  <text class="note" x="536" y="475">Human-human, human-object, and scene contacts</text>
  <rect class="chip" x="536" y="499" width="84" height="32" rx="12"/><text class="chipText" x="552" y="520">InterGen</text>
  <rect class="chip" x="630" y="499" width="82" height="32" rx="12"/><text class="chipText" x="649" y="520">BEHAVE</text>
  <rect class="chip" x="536" y="537" width="82" height="32" rx="12"/><text class="chipText" x="551" y="558">InterDiff</text>

  <rect class="box box-amber" x="940" y="285" width="270" height="170" rx="18"/>
  <text class="label" x="966" y="325">Humanoid Simulation</text>
  <text class="note" x="966" y="350">Retargeting, physics, control, and policies</text>
  <rect class="chip" x="966" y="374" width="84" height="32" rx="12"/><text class="chipText" x="984" y="395">Kimodo</text>
  <rect class="chip" x="1060" y="374" width="94" height="32" rx="12"/><text class="chipText" x="1077" y="395">Unitree G1</text>
  <rect class="chip" x="966" y="412" width="88" height="32" rx="12"/><text class="chipText" x="983" y="433">Isaac Lab</text>

  <rect class="box box-gray" x="945" y="555" width="120" height="92" rx="18"/>
  <text class="label" x="968" y="591">Games</text>
  <text class="label" x="960" y="616">&amp; Animation</text>
  <text class="small" x="966" y="636">characters</text>

  <rect class="box box-gray" x="1090" y="555" width="120" height="92" rx="18"/>
  <text class="label" x="1113" y="591">Embodied</text>
  <text class="label" x="1138" y="616">AI</text>
  <text class="small" x="1115" y="636">robots</text>

  <path class="flow" d="M330 235 C390 235 450 235 510 235"/>
  <text class="caption" x="380" y="222">capture data</text>

  <path class="flow-soft" d="M510 190 C430 130 250 130 200 155"/>
  <text class="caption" x="328" y="128">feedback improves accuracy</text>

  <path class="flow" d="M575 315 C480 375 385 425 330 475"/>
  <text class="caption" x="398" y="384">training signal</text>

  <path class="flow" d="M640 315 L640 410"/>
  <text class="caption" x="657" y="365">interaction data</text>

  <path class="flow" d="M770 238 C870 255 900 302 940 342"/>
  <text class="caption" x="815" y="250">benchmark + priors</text>

  <path class="flow" d="M330 492 C585 492 765 405 940 370"/>
  <text class="caption" x="706" y="430">motion skills</text>

  <path class="flow" d="M770 492 C850 485 900 430 940 390"/>
  <text class="caption" x="808" y="478">contact constraints</text>

  <path class="flow-app" d="M200 315 C310 670 735 650 945 605"/>
  <path class="flow-app" d="M200 575 C365 655 680 675 945 622"/>
  <path class="flow-app" d="M640 575 C740 630 845 632 945 618"/>
  <text class="caption" x="560" y="690">games and animation consume capture, generated motion, and interaction</text>

  <path class="flow-app" d="M1075 455 L1135 555"/>
  <text class="caption" x="1120" y="500">embodied policy</text>
</svg>
